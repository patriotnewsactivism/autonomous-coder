services:
  - type: web
    name: autonomous-coder-api
    runtime: node
    plan: free
    buildCommand: npm run build
    startCommand: node dist/index.js
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_MODEL
        sync: false
        value: deepseek-chat
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        sync: false
        value: llama-3.3-70b-versatile
      - key: GOOGLE_API_KEY
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: COHERE_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
